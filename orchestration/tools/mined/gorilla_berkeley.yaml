tools:
  calculate_triangle_area:
    name: calculate_triangle_area
    description: Calculate the area of a triangle given its base and height.
    parameters:
      base:
        type: integer
        description: The base of the triangle.
        required: true
      height:
        type: integer
        description: The height of the triangle.
        required: true
      unit:
        type: string
        description: The unit of measure (defaults to 'units' if not specified)
    source: bfcl_v4
    category: math
  math.factorial:
    name: math.factorial
    description: Calculate the factorial of a given number.
    parameters:
      number:
        type: integer
        description: The number for which factorial needs to be calculated.
        required: true
    source: bfcl_v4
    category: math
  math.hypot:
    name: math.hypot
    description: Calculate the Euclidean norm, sqrt(sum(squares)), the length of the
      vector from the origin to point (x, y) which is the hypotenuse of the right
      triangle.
    parameters:
      x:
        type: integer
        description: The x-coordinate value.
        required: true
      y:
        type: integer
        description: The y-coordinate value.
        required: true
      z:
        type: integer
        description: Optional. The z-coordinate value. Default is 0.
    source: bfcl_v4
    category: math
  algebra.quadratic_roots:
    name: algebra.quadratic_roots
    description: Find the roots of a quadratic equation ax^2 + bx + c = 0.
    parameters:
      a:
        type: integer
        description: Coefficient of x^2.
        required: true
      b:
        type: integer
        description: Coefficient of x.
        required: true
      c:
        type: integer
        description: Constant term.
        required: true
    source: bfcl_v4
    category: general
  solve_quadratic_equation:
    name: solve_quadratic_equation
    description: Function solves the quadratic equation and returns its roots.
    parameters:
      a:
        type: integer
        description: Coefficient of x squared
        required: true
      b:
        type: integer
        description: Coefficient of x
        required: true
      c:
        type: integer
        description: Constant term in the quadratic equation.
        required: true
    source: bfcl_v4
    category: general
  solve_quadratic:
    name: solve_quadratic
    description: Solve a quadratic equation given coefficients a, b, and c. If optional
      'root_type' is 'real', the function will only return real roots. If not specified,
      function may return complex roots.
    parameters:
      a:
        type: integer
        description: The coefficient of the squared term in the quadratic equation.
        required: true
      b:
        type: integer
        description: The coefficient of the linear term in the quadratic equation.
        required: true
      c:
        type: integer
        description: The constant term in the quadratic equation.
        required: true
      root_type:
        type: string
        description: 'The type of roots to return: ''real'' for real roots, ''all''
          for both real and complex roots. Default value is ''real''.'
    source: bfcl_v4
    category: general
  calculate_circumference:
    name: calculate_circumference
    description: Calculates the circumference of a circle with a given radius.
    parameters:
      radius:
        type: integer
        description: The radius of the circle in the unit given.
        required: true
      unit:
        type: string
        description: The unit of measurement for the radius. Default is 'cm'.
    source: bfcl_v4
    category: math
  geometry.area_circle:
    name: geometry.area_circle
    description: Calculate the area of a circle given the radius.
    parameters:
      radius:
        type: integer
        description: The radius of the circle.
        required: true
      units:
        type: string
        description: The units in which the radius is measured (defaults to 'meters').
    source: bfcl_v4
    category: math
  geometry.calculate_area_circle:
    name: geometry.calculate_area_circle
    description: Calculate the area of a circle given its radius.
    parameters:
      radius:
        type: integer
        description: The radius of the circle.
        required: true
      unit:
        type: string
        description: The measurement unit of the radius (optional parameter, default
          is 'units').
    source: bfcl_v4
    category: math
  calculate_area:
    name: calculate_area
    description: Calculate the area of a right-angled triangle given the lengths of
      its base and height.
    parameters:
      base:
        type: integer
        description: The length of the base of the right-angled triangle.
        required: true
      height:
        type: integer
        description: The height of the right-angled triangle.
        required: true
      unit:
        type: string
        description: The unit of measure used. Defaults to 'cm'.
    source: bfcl_v4
    category: math
  geometry.circumference:
    name: geometry.circumference
    description: Calculate the circumference of a circle given the radius.
    parameters:
      radius:
        type: integer
        description: The radius of the circle.
        required: true
      units:
        type: string
        description: Units for the output circumference measurement. Default is 'cm'.
    source: bfcl_v4
    category: general
  calculate_area_under_curve:
    name: calculate_area_under_curve
    description: Calculate the area under a mathematical function within a given interval.
    parameters:
      function:
        type: string
        description: The mathematical function as a string.
        required: true
      interval:
        type: array
        description: An array that defines the interval to calculate the area under
          the curve from the start to the end point.
        required: true
      method:
        type: string
        description: The numerical method to approximate the area under the curve.
          The default value is 'trapezoidal'.
    source: bfcl_v4
    category: math
  calculate_derivative:
    name: calculate_derivative
    description: Calculate the derivative of a polynomial function.
    parameters:
      function:
        type: string
        description: The polynomial function.
        required: true
      x_value:
        type: float
        description: The x-value at which the derivative is calculated. Optional,
          default to 0.00.
    source: bfcl_v4
    category: math
  integrate:
    name: integrate
    description: Calculate the area under a curve for a specified function between
      two x values.
    parameters:
      function:
        type: string
        description: The function to integrate, represented as a string. For example,
          'x^3'
        required: true
      start_x:
        type: integer
        description: The starting x-value to integrate over.
        required: true
      end_x:
        type: integer
        description: The ending x-value to integrate over.
        required: true
      method:
        type: string
        description: The method of numerical integration to use. Choices are 'trapezoid'
          or 'simpson'. Default is 'trapezoid'.
    source: bfcl_v4
    category: general
  calculus.derivative:
    name: calculus.derivative
    description: Compute the derivative of a function at a specific value.
    parameters:
      function:
        type: string
        description: The function to calculate the derivative of.
        required: true
      value:
        type: integer
        description: The value where the derivative needs to be calculated at.
        required: true
      function_variable:
        type: string
        description: The variable present in the function, for instance x or y, etc.
          Default is 'x'.
    source: bfcl_v4
    category: general
  get_prime_factors:
    name: get_prime_factors
    description: Function to retrieve prime factors of a number.
    parameters:
      number:
        type: integer
        description: Number for which prime factors need to be calculated
        required: true
      formatted:
        type: boolean
        description: Return formatted string if true, array if false. Default is true.
        required: true
    source: bfcl_v4
    category: web
  number_analysis.prime_factors:
    name: number_analysis.prime_factors
    description: Compute the prime factors of a number.
    parameters:
      number:
        type: integer
        description: The number to be factored.
        required: true
    source: bfcl_v4
    category: general
  math.gcd:
    name: math.gcd
    description: Compute the greatest common divisor of two numbers
    parameters:
      num1:
        type: integer
        description: The first number.
        required: true
      num2:
        type: integer
        description: The second number.
        required: true
    source: bfcl_v4
    category: math
  math.hcf:
    name: math.hcf
    description: Calculate the highest common factor of two numbers.
    parameters:
      number1:
        type: integer
        description: First number.
        required: true
      number2:
        type: integer
        description: Second number.
        required: true
    source: bfcl_v4
    category: math
  number_theory.gcd:
    name: number_theory.gcd
    description: Compute the greatest common divisor of two given integers.
    parameters:
      number1:
        type: integer
        description: The first integer.
        required: true
      number2:
        type: integer
        description: The second integer.
        required: true
    source: bfcl_v4
    category: general
  prime_factorize:
    name: prime_factorize
    description: Calculate the prime factorization of a given integer.
    parameters:
      number:
        type: integer
        description: The number for which to calculate the prime factorization.
        required: true
      return_type:
        type: string
        description: Determines the format of the returned prime factorization. Can
          be 'list' for a list of all prime factors or 'dictionary' for a count of
          each prime factor. Default is 'list'.
    source: bfcl_v4
    category: general
  calculate_final_velocity:
    name: calculate_final_velocity
    description: Calculate the final velocity of a free falling object given the height
      it's dropped from, the initial velocity and acceleration due to gravity. Ignore
      air resistance.
    parameters:
      height:
        type: integer
        description: The height the object is dropped from, in meters.
        required: true
      initial_velocity:
        type: integer
        description: The initial velocity of the object in m/s. Default is zero.
      gravity:
        type: float
        description: Acceleration due to gravity. Default value is 9.81 m/s^2, earth's
          gravity.
    source: bfcl_v4
    category: math
  calculate_velocity:
    name: calculate_velocity
    description: Calculate the velocity for a certain distance travelled within a
      specific duration.
    parameters:
      distance:
        type: integer
        description: The distance travelled by the object, typically in kilometers.
        required: true
      duration:
        type: integer
        description: The duration of the journey, typically in hours.
        required: true
      unit:
        type: string
        description: Optional parameter. The unit to return the velocity in. If not
          provided, the default is km/h.
    source: bfcl_v4
    category: math
  final_velocity:
    name: final_velocity
    description: Calculate the final velocity of an object given its initial velocity,
      acceleration, and time.
    parameters:
      initial_velocity:
        type: integer
        description: The initial velocity of the object in meters/second.
        required: true
      acceleration:
        type: integer
        description: The acceleration of the object in meters/second^2.
        required: true
      time:
        type: integer
        description: The time over which the acceleration is applied in seconds.
        required: true
    source: bfcl_v4
    category: general
  calculate_displacement:
    name: calculate_displacement
    description: Calculates the displacement of an object in motion given initial
      velocity, time, and acceleration.
    parameters:
      initial_velocity:
        type: integer
        description: The initial velocity of the object in m/s.
        required: true
      time:
        type: integer
        description: The time in seconds that the object has been in motion.
        required: true
      acceleration:
        type: float
        description: The acceleration of the object in m/s^2.
        default: 0
    source: bfcl_v4
    category: math
  calculate_final_speed:
    name: calculate_final_speed
    description: Calculate the final speed of an object in free fall after a certain
      time, neglecting air resistance. The acceleration due to gravity is considered
      as -9.81 m/s^2
    parameters:
      initial_speed:
        type: integer
        description: The initial speed of the object in m/s. Default is 0 for an object
          at rest.
      time:
        type: integer
        description: The time in seconds for which the object is in free fall.
        required: true
      gravity:
        type: float
        description: The acceleration due to gravity. Default is -9.81 m/s^2.
    source: bfcl_v4
    category: math
  kinematics.final_velocity_from_distance:
    name: kinematics.final_velocity_from_distance
    description: Calculate the final velocity of an object given the acceleration
      and distance travelled, assuming initial velocity is 0.
    parameters:
      acceleration:
        type: integer
        description: Acceleration of the object, m/s^2.
        required: true
      distance:
        type: integer
        description: Distance traveled by the object, m.
        required: true
      initial_velocity:
        type: float
        description: Initial velocity of the object. Default is 0, m/s
    source: bfcl_v4
    category: general
  get_directions:
    name: get_directions
    description: Retrieve directions from one location to another.
    parameters:
      start_location:
        type: string
        description: The starting point of the journey.
        required: true
      end_location:
        type: string
        description: The destination point of the journey.
        required: true
      route_type:
        type: string
        description: Type of route to use (e.g., 'fastest', 'scenic'). Default is
          'fastest'.
        enum:
        - fastest
        - scenic
    source: bfcl_v4
    category: web
  travel_itinerary_generator:
    name: travel_itinerary_generator
    description: Generate a travel itinerary based on specific destination, duration
      and daily budget, with preferred exploration type.
    parameters:
      destination:
        type: string
        description: Destination city of the trip.
        required: true
      days:
        type: integer
        description: Number of days for the trip.
        required: true
      daily_budget:
        type: integer
        description: The maximum daily budget for the trip.
        required: true
      exploration_type:
        type: string
        description: The preferred exploration type.
        default: urban
        enum:
        - nature
        - urban
        - history
        - culture
    source: bfcl_v4
    category: general
  vegan_restaurant.find_nearby:
    name: vegan_restaurant.find_nearby
    description: Locate nearby vegan restaurants based on specific criteria like operating
      hours.
    parameters:
      location:
        type: string
        description: The city and state, e.g. New York, NY, you should format it as
          City, State.
        required: true
      operating_hours:
        type: integer
        description: Preferred latest closing time of the restaurant. E.g. if 11 is
          given, then restaurants that close at or after 11 PM will be considered.
          This is in 24 hour format. Default is 24.
    source: bfcl_v4
    category: general
  get_shortest_driving_distance:
    name: get_shortest_driving_distance
    description: Calculate the shortest driving distance between two locations.
    parameters:
      origin:
        type: string
        description: Starting point of the journey. You should format it as city name
          like Boston.
        required: true
      destination:
        type: string
        description: End point of the journey. You should format it as city name like
          Boston.
        required: true
      unit:
        type: string
        description: Preferred unit of distance (optional, default is 'km').
    source: bfcl_v4
    category: web
  route.estimate_time:
    name: route.estimate_time
    description: Estimate the travel time for a specific route with optional stops.
    parameters:
      start_location:
        type: string
        description: The starting point for the journey. It should be format as city
          name such as Boston.
        required: true
      end_location:
        type: string
        description: The destination for the journey. It should be format as city
          name such as Boston.
        required: true
      stops:
        type: array
        description: Additional cities or points of interest to stop at during the
          journey. Default is an empty list.
    source: bfcl_v4
    category: general
  calculate_electrostatic_potential:
    name: calculate_electrostatic_potential
    description: Calculate the electrostatic potential between two charged bodies
      using the principle of Coulomb's Law.
    parameters:
      charge1:
        type: float
        description: The quantity of charge on the first body.
        required: true
      charge2:
        type: float
        description: The quantity of charge on the second body.
        required: true
      distance:
        type: float
        description: The distance between the two bodies.
        required: true
      constant:
        type: float
        description: The value of the electrostatic constant. Default is 8.99e9.
    source: bfcl_v4
    category: math
  calculate_electric_field:
    name: calculate_electric_field
    description: Calculate the electric field produced by a charge at a certain distance.
    parameters:
      charge:
        type: integer
        description: Charge in coulombs producing the electric field.
        required: true
      distance:
        type: integer
        description: Distance from the charge in meters where the field is being measured.
        required: true
      permitivity:
        type: float
        description: Permitivity of the space where field is being calculated, default
          is 8.854e-12.
    source: bfcl_v4
    category: math
  calculate_magnetic_field:
    name: calculate_magnetic_field
    description: Calculate the magnetic field produced at the center of a circular
      loop carrying current.
    parameters:
      current:
        type: integer
        description: The current through the circular loop in Amperes.
        required: true
      radius:
        type: integer
        description: The radius of the circular loop in meters.
        required: true
      permeability:
        type: float
        description: The magnetic permeability. Default is 12.57e10 (Vacuum Permeability).
    source: bfcl_v4
    category: math
  electromagnetic_force:
    name: electromagnetic_force
    description: Calculate the electromagnetic force between two charges placed at
      a certain distance.
    parameters:
      charge1:
        type: integer
        description: The magnitude of the first charge in coulombs.
        required: true
      charge2:
        type: integer
        description: The magnitude of the second charge in coulombs.
        required: true
      distance:
        type: integer
        description: The distance between the two charges in meters.
        required: true
      medium_permittivity:
        type: float
        description: The relative permittivity of the medium in which the charges
          are present. Default is 8.854e-12 (Vacuum Permittivity).
    source: bfcl_v4
    category: general
  calculate_resonant_frequency:
    name: calculate_resonant_frequency
    description: Calculate the resonant frequency of an LC (inductor-capacitor) circuit.
    parameters:
      inductance:
        type: float
        description: The inductance (L) in henries (H).
        required: true
      capacitance:
        type: float
        description: The capacitance (C) in farads (F).
        required: true
      round_off:
        type: integer
        description: Rounding off the result to a certain decimal places, default
          is 2.
    source: bfcl_v4
    category: math
  calculate_magnetic_field_strength:
    name: calculate_magnetic_field_strength
    description: Calculate the magnetic field strength at a point a certain distance
      away from a long wire carrying a current.
    parameters:
      current:
        type: integer
        description: The current flowing through the wire in Amperes.
        required: true
      distance:
        type: integer
        description: The perpendicular distance from the wire to the point where the
          magnetic field is being calculated.
        required: true
      permeability:
        type: float
        description: The permeability of the medium. Default is 12.57e-7 (Vacuum Permeability).
    source: bfcl_v4
    category: math
  calculate_electric_field_strength:
    name: calculate_electric_field_strength
    description: Calculate the electric field strength at a certain distance from
      a point charge.
    parameters:
      charge:
        type: float
        description: The charge in Coulombs.
        required: true
      distance:
        type: integer
        description: The distance from the charge in meters.
        required: true
      medium:
        type: string
        description: The medium in which the charge and the point of calculation is
          located. Default is 'vacuum'.
    source: bfcl_v4
    category: math
  thermo.calculate_energy:
    name: thermo.calculate_energy
    description: Calculate the energy required or released during a phase change using
      mass, the phase transition temperature and the specific latent heat.
    parameters:
      mass:
        type: integer
        description: Mass of the substance in grams.
        required: true
      phase_transition:
        type: string
        description: Phase transition. Can be 'melting', 'freezing', 'vaporization',
          'condensation'.
        required: true
      substance:
        type: string
        description: The substance which is undergoing phase change, default is 'water'
    source: bfcl_v4
    category: math
  calculate_final_temperature:
    name: calculate_final_temperature
    description: Calculates the final equilibrium temperature after mixing two bodies
      with different masses and temperatures
    parameters:
      mass1:
        type: integer
        description: The mass of the first body (kg).
        required: true
      temperature1:
        type: integer
        description: The initial temperature of the first body (Celsius).
        required: true
      mass2:
        type: integer
        description: The mass of the second body (kg).
        required: true
      temperature2:
        type: integer
        description: The initial temperature of the second body (Celsius).
        required: true
      specific_heat_capacity:
        type: float
        description: The specific heat capacity of the bodies in kJ/kg/K. If not provided,
          will default to that of water at room temperature, which is 4.2 kJ/kg/K.
    source: bfcl_v4
    category: math
  get_boiling_melting_points:
    name: get_boiling_melting_points
    description: Retrieve the boiling point and melting point of a substance based
      on its name and the sea level.
    parameters:
      substance:
        type: string
        description: The name of the substance.
        required: true
      sea_level:
        type: integer
        description: The sea level in meters.
        required: true
    source: bfcl_v4
    category: web
  calculate_density:
    name: calculate_density
    description: Calculate the density of a substance based on its mass and volume.
    parameters:
      mass:
        type: integer
        description: The mass of the substance in kilograms.
        required: true
      volume:
        type: integer
        description: The volume of the substance in cubic meters.
        required: true
      unit:
        type: string
        description: "The unit of density. Default is kg/m\xB3"
    source: bfcl_v4
    category: math
  calc_absolute_pressure:
    name: calc_absolute_pressure
    description: Calculates the absolute pressure from gauge and atmospheric pressures.
    parameters:
      atm_pressure:
        type: integer
        description: The atmospheric pressure in atmospheres (atm). Default is 1 atm
          if not provided.
      gauge_pressure:
        type: integer
        description: The gauge pressure in atmospheres (atm). Must be provided.
        required: true
    source: bfcl_v4
    category: general
  entropy_change.calculate:
    name: entropy_change.calculate
    description: Calculate the change in entropy for a mass of a specific substance
      under set initial and final conditions.
    parameters:
      substance:
        type: string
        description: The substance for which the change in entropy is calculated.
        required: true
      mass:
        type: integer
        description: The mass of the substance in kg.
        required: true
      initial_temperature:
        type: integer
        description: The initial temperature of the substance in degree Celsius.
        required: true
      final_temperature:
        type: integer
        description: The final temperature of the substance in degree Celsius.
        required: true
      pressure:
        type: integer
        description: The pressure the substance is under in atmospheres.
        default: 1
    source: bfcl_v4
    category: math
  calculate_entropy_change:
    name: calculate_entropy_change
    description: Calculate the entropy change for an isothermal and reversible process.
    parameters:
      initial_temp:
        type: integer
        description: The initial temperature in Kelvin.
        required: true
      final_temp:
        type: integer
        description: The final temperature in Kelvin.
        required: true
      heat_capacity:
        type: integer
        description: The heat capacity in J/K.
        required: true
      isothermal:
        type: boolean
        description: Whether the process is isothermal. Default is True.
    source: bfcl_v4
    category: math
  calc_heat_capacity:
    name: calc_heat_capacity
    description: Calculate the heat capacity at constant pressure of air using its
      temperature and volume.
    parameters:
      temp:
        type: integer
        description: The temperature of the gas in Kelvin.
        required: true
      volume:
        type: integer
        description: The volume of the gas in m^3.
        required: true
      gas:
        type: string
        description: Type of gas, with 'air' as default.
    source: bfcl_v4
    category: general
  fetch_DNA_sequence:
    name: fetch_DNA_sequence
    description: Retrieve the sequence of a DNA molecule with the given id from a
      public database.
    parameters:
      DNA_id:
        type: string
        description: Unique ID of the DNA molecule in the database.
        required: true
      format:
        type: string
        description: Optional parameter to get sequence in specific format (default
          to 'fasta').
      upstream:
        type: integer
        description: Optional parameter to include certain number of base pairs upstream
          the DNA sequence (default to 0).
    source: bfcl_v4
    category: web
  get_protein_sequence:
    name: get_protein_sequence
    description: Retrieve the protein sequence encoded by a human gene.
    parameters:
      gene:
        type: string
        description: The human gene of interest.
        required: true
      species:
        type: string
        description: The species for which the gene is to be analyzed.
        default: Homo sapiens
    source: bfcl_v4
    category: web
  biology.get_cell_info:
    name: biology.get_cell_info
    description: Retrieve information about the structure and functioning of a specified
      type of cell
    parameters:
      cell_type:
        type: string
        description: Type of cell you want information about
        required: true
      detailed:
        type: boolean
        description: Indicate if you want a detailed description of the cell
        default: 'false'
    source: bfcl_v4
    category: web
  cellbio.get_proteins:
    name: cellbio.get_proteins
    description: Get the list of proteins in a specific cell compartment.
    parameters:
      cell_compartment:
        type: string
        description: The specific cell compartment.
        required: true
      include_description:
        type: boolean
        description: Set true if you want a brief description of each protein.
        default: 'false'
