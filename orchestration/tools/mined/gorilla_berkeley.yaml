    parameters:
      species1:
        type: string
        description: The first species to compare.
        required: true
      species2:
        type: string
        description: The second species to compare.
        required: true
      format:
        type: string
        description: The format of the result (percentage or fraction). Default is
          percentage.
    source: bfcl_v4
    category: math
  calculate_genotype_frequency:
