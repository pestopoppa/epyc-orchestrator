runtime_defaults:
  quantization: Q4_K_M
  draft_quantization: Q8_0
  context_length: 8192
  temperature: 0.2
  threads: 96
  numa_policy: interleave=all
  model_base_path: /mnt/raid0/llm/lmstudio/models
  # Binary paths - SINGLE SOURCE OF TRUTH for all launch commands
  binaries:
    base_dir: /mnt/raid0/llm/llama.cpp/build/bin
    # Core inference binaries
    completion: llama-completion      # baseline, MoE reduction (preferred for benchmarks)
    speculative: llama-speculative    # spec decode with draft model
    lookup: llama-lookup              # prompt n-gram lookup
    cli: llama-cli                    # interactive mode (AVOID for benchmarks - hangs)
    server: llama-server              # persistent model server for benchmarks
    # Vision/multimodal binaries
    mtmd: llama-mtmd-cli              # multimodal (vision) inference
    qwen2vl: llama-qwen2vl-cli        # Qwen2-VL specific (deprecated, use mtmd)
    # Utility binaries
    bench: llama-bench                # quick speed benchmarks (no quality)
    embedding: llama-embedding        # embedding generation
    perplexity: llama-perplexity      # quality/perplexity testing
    quantize: llama-quantize          # model quantization
  # Server mode settings
  server_defaults:
    port: 8080
    # NOTE: context_length is the MAXIMUM for benchmarks, but actual context
    # is min(this, model.max_context). Models with smaller limits should set
    # max_context in their model definition. Default assumes 64K support.
    context_length: 65536             # 64K default - models needing more set max_context
    startup_timeout: 600              # 10 minutes for large models (480B loads in ~35s)
    request_timeout: 300              # 5 minutes per request
    parallel_slots: 4                 # concurrent request slots
    flash_attention: true             # Enable by default, models can override with constraints.flash_attention: false
    ubatch_size: 8192                 # Large batch for faster prompt processing (diminishing returns beyond this)
  # Model context length defaults by architecture/family
  # Models can override with max_context in their definition
  context_limits:
    default: 65536                    # Most modern models support 64K+
    llama2: 4096                      # Llama 2 base: 4K
    llama3: 8192                      # Llama 3 base: 8K (instruct versions support 128K)
    llama3_instruct: 131072           # Llama 3 Instruct: 128K
    qwen2: 131072                     # Qwen2/2.5: 128K
    qwen3: 131072                     # Qwen3: 128K+
    deepseek_r1: 65536                # DeepSeek R1 distills: 64K
    gemma3: 131072                    # Gemma 3: 128K
  # Inference timeouts by role tier
  timeouts:
    default: 180
    tier_a: 120      # Fast frontdoor
    tier_b: 300      # Specialists may need longer
    tier_c: 180      # Workers
    tier_d: 60       # Drafts are fast
    long_context: 600  # Long prompts need more time
