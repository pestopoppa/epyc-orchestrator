id: create_handoff
name: Create Handoff Document
version: "1.0.0"
description: Generate a structured handoff document for work-in-progress tasks to enable session continuity.
category: codebase
estimated_tokens: 250

permissions:
  roles: ["frontdoor", "coder_escalation", "architect_general", "admin"]
  requires_approval: false
  destructive: false

inputs:
  - name: title
    type: string
    description: Short title for the handoff
    required: true
  - name: objective
    type: string
    description: What the handoff is trying to accomplish
    required: true
  - name: current_status
    type: string
    description: Current state of work
    required: true
  - name: next_steps
    type: string
    description: Comma-separated list of next steps
    required: true
  - name: blockers
    type: string
    description: Any blockers preventing progress
    required: false
  - name: related_files
    type: string
    description: Comma-separated list of relevant file paths
    required: false

outputs:
  - name: handoff_path
    type: path
    description: Path to the generated handoff document
  - name: blocked_tasks_updated
    type: boolean
    description: Whether BLOCKED_TASKS.md was updated

steps:
  - id: S1
    name: Generate Filename
    description: Create timestamped filename from title
    action:
      type: shell
      command: "echo \"handoffs/active/$(echo '${input.title}' | tr ' ' '_' | tr '[:upper:]' '[:lower:]')_$(date +%Y%m%d).md\""
      capture_output: handoff_filename
    on_failure: abort

  - id: S2
    name: Create Handoff Document
    description: Write the handoff markdown file
    depends_on: [S1]
    action:
      type: shell
      command: "mkdir -p handoffs/active && cat > ${outputs.handoff_filename} << 'HANDOFF_EOF'\n# ${input.title}\n\n**Created:** $(date +%Y-%m-%d)\n**Status:** In Progress\n\n## Objective\n\n${input.objective}\n\n## Current Status\n\n${input.current_status}\n\n## Next Steps\n\n$(echo '${input.next_steps}' | tr ',' '\\n' | sed 's/^/- /')\n\n## Blockers\n\n${input.blockers:-None identified}\n\n## Related Files\n\n$(echo '${input.related_files}' | tr ',' '\\n' | sed 's/^/- /')\n\n---\n*Auto-generated by create_handoff procedure*\nHANDOFF_EOF\necho 'Handoff created'"
      capture_output: create_result
    on_failure: abort

  - id: S3
    name: Update BLOCKED_TASKS.md
    description: Add entry to blocked tasks if blockers exist
    depends_on: [S2]
    condition: "${input.blockers} != ''"
    action:
      type: shell
      command: "echo -e '\\n## ${input.title}\\n- Blocker: ${input.blockers}\\n- Handoff: ${outputs.handoff_filename}\\n- Created: $(date +%Y-%m-%d)' >> orchestration/BLOCKED_TASKS.md && echo 'BLOCKED_TASKS.md updated'"
      capture_output: blocked_update_result
    on_failure: continue

verification:
  gates: ["file_exists"]
  assertions:
    - expression: "'created' in outputs.get('create_result', '').lower()"
      message: "Handoff document must be created"

rollback:
  enabled: true
  checkpoint_before: false
  steps:
    - id: R1
      action:
        type: shell
        command: "rm -f ${outputs.handoff_filename} 2>/dev/null || true"

metadata:
  author: orchestrator
  tags: ["codebase", "handoff", "documentation"]
