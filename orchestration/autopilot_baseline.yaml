# AutoPilot frozen baseline metrics.
# Update via: python autopilot.py checkpoint --production-best
#
# Recalibrated 2026-04-04 for hybrid eval (T1 scale).
# Previous T0-only baseline was misleading — T0 saturated at 3.0 after trial 15.
# T1 (50 questions) and T2 (480 questions) give honest signal.
# Using T2 trial-45 as reference (most recent honest measurement).

quality: 1.16             # T2 quality from trial 45 (480q, ~39% correct on 0-3 scale)
speed: 18.0               # Median t/s from T2 eval
cost: 0.5                 # Normalized cost estimate
reliability: 0.86         # 86% non-error from trial 45
