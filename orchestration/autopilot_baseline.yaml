  hotpotqa: null      # multi-hop (4 sentinels)
  simpleqa: null      # factual recall (3 sentinels)
  mode_advantage_hard: null  # escalation-requiring (3 sentinels)
  gpqa: null          # hard science MCQ (4 sentinels)
