  - claim: "baseline|deepseek_r1"
    initial_confidence: 0.88
    rationale: "No compatible draft model, but baseline quality is excellent"

  - claim: "ngram_lookup|long_context"
    initial_confidence: 0.75
    rationale: "llama-cli --lookup-ngram-min works where llama-lookup crashes"

  - claim: "non_interactive_flags|benchmarking"
    initial_confidence: 0.95
    rationale: "--no-display-prompt --simple-io prevents hangs"

  - claim: "explicit_tool_instructions|repl_compliance"
    initial_confidence: 0.72
    rationale: "Models need explicit NO IMPORTS warning"
