# =============================================================================
# Lean Model Registry — FOSS Orchestrator
# =============================================================================
#
# Stripped-down registry for deployments without local model infrastructure.
# Contains only: timeouts, acceleration config, backend routing, escalation
# chains, and routing hints.
#
# Missing sections (vs full registry): model.*, performance.*, memory.*,
# constraints, command_templates, binaries, model_base_path.
#
# Usage:
#   ORCHESTRATOR_REGISTRY_MODE=lean  (selects this file)
#   ORCHESTRATOR_REGISTRY_MODE=full  (default, uses model_registry.yaml)
#
# =============================================================================

runtime_defaults:
  temperature: 0.2
  context_length: 8192

  timeouts:
    default: 600

    roles:
      worker_explore: 60
      worker_math: 60
      worker_vision: 60
      worker_summarize: 120
      worker_general: 60
      worker_coder: 30
      worker_code: 60
      worker_fast: 30
      frontdoor: 180
      coder_escalation: 120
      vision_escalation: 120
      ingest_long_context: 300
      architect_general: 600
      architect_coding: 600

    server:
      request: 600
      connect: 5
      health_check: 5

    services:
      ocr_single_page: 120
      ocr_pdf: 600
      vision_inference: 120
      vision_figure: 60
      gradio_client: 300
      ffmpeg_version: 5
      ffmpeg_probe: 30
      ffmpeg_extract: 600
      exiftool: 30

    repl:
      session: 600
      tool_execution: 30
      shell_command: 30

    tools:
      web_fetch: 30
      lint: 60
      base_default: 60

  llm:
    depth_role_overrides: "1:worker_general,2:worker_math"
    depth_override_max_depth: 3

roles:
  frontdoor:
    tier: A
    description: Primary interactive orchestrator
    backend:
      type: local
    acceleration:
      type: moe_expert_reduction
      experts: 6
      speculative_decoding:
        type: speculative_decoding
        draft_role: draft_qwen3_coder_0_75b
        k: 16
        lookup: true
    generation_defaults:
      n_tokens: -1
      temperature: 0.3

  coder_escalation:
    tier: B
    description: Coding escalation target
    acceleration:
      type: speculative_decoding
      draft_role: draft_qwen2_5_coder_0_5b
      k: 24
      lookup: true
    generation_defaults:
      n_tokens: -1
      temperature: 0.2

  worker_explore:
    tier: C
    description: Fast exploration worker
    acceleration:
      type: speculative_decoding
      draft_role: draft_qwen2_5_coder_0_5b
      k: 16
      lookup: true
    generation_defaults:
      n_tokens: -1
      temperature: 0.2

  worker_general:
    tier: C
    description: General-purpose worker
    acceleration:
      type: speculative_decoding
      draft_role: draft_qwen2_5_coder_0_5b
      k: 16
      lookup: true
    generation_defaults:
      n_tokens: -1
      temperature: 0.2

  worker_math:
    tier: C
    description: Math/reasoning specialist worker
    generation_defaults:
      n_tokens: -1
      temperature: 0.1

  worker_vision:
    tier: C
    description: Vision processing worker
    generation_defaults:
      n_tokens: -1
      temperature: 0.2

  vision_escalation:
    tier: B
    description: Vision escalation target
    generation_defaults:
      n_tokens: -1
      temperature: 0.2

  worker_summarize:
    tier: C
    description: Summarization worker
    generation_defaults:
      n_tokens: -1
      temperature: 0.2

  ingest_long_context:
    tier: B
    description: Long-context document ingestion
    generation_defaults:
      n_tokens: -1
      temperature: 0.2

  architect_general:
    tier: B
    description: General architecture specialist
    acceleration:
      type: speculative_decoding
      draft_role: draft_qwen3_0_6b_q8_0
      k: 16
    generation_defaults:
      n_tokens: -1
      temperature: 0.3

  architect_coding:
    tier: B
    description: Coding architecture specialist
    acceleration:
      type: speculative_decoding
      draft_role: draft_qwen3_coder_0_75b
      k: 16
    generation_defaults:
      n_tokens: -1
      temperature: 0.3

  # Draft models (tier D — used by speculative decoding)
  draft_qwen3_coder_0_75b:
    tier: D
    description: Draft model for Qwen3-Coder family (jukofyork vocab transplant)
    model:
      name: Qwen3-Coder-Instruct-DRAFT-0.75B-32k-Q4_0
      path: /mnt/raid0/llm/models/Qwen3-Coder-Instruct-DRAFT-0.75B-32k-Q4_0.gguf
      quant: Q4_0
      size_gb: 0.45
      architecture: dense
    candidate_roles:
    - draft

  draft_qwen2_5_coder_0_5b:
    tier: D
    description: Draft model - Qwen2.5-Coder-0.5B-Q4_K_M
    model:
      name: Qwen2.5-Coder-0.5B-Q4_K_M
      path: lmstudio-community/Qwen2.5-Coder-0.5B-GGUF/Qwen2.5-Coder-0.5B-Q4_K_M.gguf
      quant: Q4_K_M
      size_gb: 0.4
      architecture: dense
    candidate_roles:
    - draft

  draft_qwen3_0_6b_q8_0:
    tier: D
    description: Draft model - Qwen3-0.6B-Q8_0 (production draft for 235B architect)
    model:
      name: Qwen_Qwen3-0.6B-Q8_0
      path: /mnt/raid0/llm/models/Qwen_Qwen3-0.6B-Q8_0.gguf
      quant: Q8_0
      size_gb: 0.75
      architecture: dense
    candidate_roles:
    - draft

  # External API roles
  anthropic_claude:
    tier: B
    description: Anthropic Claude API backend
    backend:
      type: anthropic
    generation_defaults:
      n_tokens: 4096
      temperature: 0.3

  openai_gpt:
    tier: B
    description: OpenAI GPT API backend
    backend:
      type: openai
    generation_defaults:
      n_tokens: 4096
      temperature: 0.3

escalation_chains:
  coder:
    description: Code generation escalation path
    chain:
    - frontdoor
    - coder_escalation
    - architect_coding
    triggers:
    - error_categories:
      - timeout
      - inference_error
      - internal_error
    - output_too_short: 50
    - explicit_request: true
    max_escalations: 2
  general:
    description: General task escalation path
    chain:
    - worker_general
    - frontdoor
    - architect_general
    triggers:
    - error_categories:
      - timeout
      - inference_error
    - explicit_request: true
    max_escalations: 2

routing_hints:
- if: task_type == 'chat' and priority == 'interactive'
  use:
  - frontdoor
- if: task_type == 'code'
  use:
  - coder_escalation
  escalate_to: architect_coding
- if: task_type == 'code' and 'refactor' in objective
  use:
  - coder_escalation
  - worker_general
  escalate_to: architect_coding
- if: task_type == 'code' and escalation.triggered
  use:
  - coder_escalation
  escalate_to: architect_coding
- if: task_type == 'ingest'
  use:
  - ingest_long_context
- if: task_type == 'doc' and priority == 'interactive'
  use:
  - frontdoor
  - worker_general
- if: task_type == 'doc' and 'summarize' in objective
  use:
  - worker_summarize
- if: task_type == 'manage'
  use:
  - frontdoor
  - worker_general
- if: '''math'' in constraints or ''invariant'' in objective'
  use:
  - worker_math
- if: '''image'' in inputs or ''screenshot'' in inputs or ''ui'' in objective'
  use:
  - worker_vision
- if: task_type in ['code', 'math'] and complexity == 'high'
  preprocess: formalizer
  use:
  - coder_escalation
  - worker_math
- if: escalation.max_level == 'B3'
  use:
  - architect_general
- if: escalation.max_level == 'B3' and task_type == 'code'
  use:
  - architect_coding
