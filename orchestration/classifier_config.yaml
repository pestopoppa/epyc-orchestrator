# Classifier Configuration
# Externalized keywords, patterns, and thresholds for all classifiers.
# Used by src/classifiers/config_loader.py
---

# Tier 1: Simple keyword matching (config-driven, no embeddings)
keyword_matchers:
  summarization:
    keywords:
      - summarize
      - summary
      - summarise
      - summarisation
      - executive summary
      - overview
      - key points
      - main ideas
      - "tl;dr"
      - tldr
      - synopsis
    case_sensitive: false

  structured_analysis:
    keywords:
      - analyze
      - architecture
      - diagram
      - protocol
      - economic model
      - security audit
      - security analysis
      - whitepaper
      - smart contract
      - incentive
      - trust assumption
      - attack vector
      - forensic
      - entity extraction
      - business relationship
      - flow chart
      - flowchart
      - sequence diagram
      - system design
      - data flow
      - state machine
    case_sensitive: false

  coding_task:
    keywords:
      - implement
      - code
      - function
      - "class "
      - method
      - debug
      - refactor
      - bug
      - error
      - exception
      - compile
      - syntax
      - algorithm
      - data structure
      - api
      - endpoint
      - database
      - query
      - sql
      - test
      - unit test
      - integration
    case_sensitive: false

  stub_final:
    patterns:
      - complete
      - see above
      - analysis complete
      - estimation complete
      - done
      - finished
      - see results above
      - see output above
      - see structured output above
      - see integrated results above
      - see the structured output above
    normalize: true  # strip, lowercase, remove trailing .

# Tier 2: MemRL-backed routing (semantic matching + keyword fallback)
routing_classifiers:
  direct_mode:
    context_threshold: 20000  # chars - keep REPL for large contexts
    repl_indicators:
      - read the file
      - list files
      - list the files
      - look at the file
      - open the file
      - read from
      - write to
      - save to
      - execute
      - run the
      - run this
      - search the codebase
      - find in the
      - grep for
      - explore the
      - scan the
    use_memrl: true  # MemRL-backed mode classification

  specialist_routing:
    use_memrl: true  # MemRL-backed specialist routing
    categories:
      coder_escalation:
        keywords:
          - implement
          - write code
          - function
          - "class "
          - debug
          - refactor
          - fix the bug
          - code review
          - unit test
          - algorithm
          - data structure
          - regex
          - parse
          - concurrent
          - lock-free
          - distributed
          - optimize performance
          - memory leak
          - race condition
          - deadlock
      architect_general:
        keywords:
          - architecture
          - system design
          - design pattern
          - scalab
          - microservice
          - trade-off
          - tradeoff
          - invariant
          - constraint
          - cap theorem

# Tier 3: Quality detection thresholds (externalized from hardcoded values)
# NOTE: These are now in src/config.py ChatPipelineConfig for centralization
# This section documents the values but ChatPipelineConfig is the source of truth
quality_detection:
  # Trigram unique ratio - below this indicates degeneration loops
  repetition_unique_ratio: 0.5
  # Ratio of very short lines indicating garbled output
  garbled_short_line_ratio: 0.6
  # Minimum meaningful answer length
  min_answer_length: 50
  # Prefixes to strip when checking for near-empty output
  prefix_strip:
    - "```"
    - "```python"
    - "```json"
    - "Here is"
    - "The answer is"

# Tier 4: Output parsing patterns (externalized from chat_utils.py)
output_parsing:
  tool_output_delimiter: "<<<TOOL_OUTPUT>>>...<<<END_TOOL_OUTPUT>>>"
  tool_prefix_patterns:
    - "Current [Rr]ole:\\s*"
    - "Available files:\\s*"
    - "Routing advice:\\s*"
    - "Could not get routing advice:\\s*"
    - "Creating a ticket for further investigation\\s*"
  loop_detection_probe_chars: 80
  loop_min_answer_keep: 20

# Classification exemplars for MemRL seeding (Phase 5)
# These become EpisodicStore entries with Q-values for similarity-based routing
classification_exemplars:
  summarization:
    - prompt: "Summarize the key findings of this research paper"
      expected_role: frontdoor
    - prompt: "Give me a TL;DR of this document"
      expected_role: frontdoor
    - prompt: "What are the main takeaways from this whitepaper?"
      expected_role: frontdoor

  coding:
    - prompt: "Implement a binary search algorithm in Python"
      expected_role: coder_escalation
    - prompt: "Debug this function - it returns wrong values"
      expected_role: coder_escalation
    - prompt: "Write a unit test for the authentication module"
      expected_role: coder_escalation

  complex_coding:
    - prompt: "Implement a lock-free queue with ABA problem prevention"
      expected_role: coder_escalation
    - prompt: "Fix this race condition in the concurrent map"
      expected_role: coder_escalation
    - prompt: "Optimize this database query that causes memory leaks"
      expected_role: coder_escalation

  architecture:
    - prompt: "Design a scalable microservice architecture for e-commerce"
      expected_role: architect_general
    - prompt: "What design patterns should I use for this system?"
      expected_role: architect_general
    - prompt: "Evaluate the trade-offs between these two approaches"
      expected_role: architect_general

# Tier 5: Factual-risk scoring (Phase 3)
# Scores prompts for hallucination risk based on input features.
# Complementary to conformal prediction (which gates on output uncertainty).
factual_risk:
  mode: "canary"  # off|shadow|enforce|canary — canary since 2026-04-06 (25% enforce on frontdoor, RI-10)
  # RI-10 canary: extended to 2026-04-15 (was 2026-04-12, originally 2026-04-09). Stack downtime from v3 bugs reduced data collection.
  # Decision gate: need ≥50 high-risk samples for statistical significance.
  canary_ratio: 0.25            # fraction of requests that get enforce behavior in canary mode
  canary_roles:                 # roles that participate in canary (empty = all roles)
    - "frontdoor"
  threshold_low: 0.3   # below = "low" risk band
  threshold_high: 0.7  # above = "high" risk band
  force_review_high: true       # force plan review for high-risk prompts (Phase 4)
  early_escalation_high: false  # trigger earlier escalation for high-risk (Phase 4)
  # Per-role capability adjustment — stronger models reduce effective risk
  role_adjustments:
    tier_1: 0.6   # 235B+ (architect_general, thinking_*)
    tier_2: 0.8   # 32B-70B (coder_escalation)
    tier_3: 1.0   # 7B-14B (worker_*, frontdoor, explore)
  # Feature weights for score computation (must sum to 1.0)
  feature_weights:
    has_date_question: 0.15
    has_entity_question: 0.15
    has_citation_request: 0.10
    claim_density: 0.25
    factual_keyword_ratio: 0.20
    uncertainty_markers: 0.15  # inverse — presence reduces risk

# Tier 6: Difficulty-adaptive signal (reasoning compression routing)
# Scores prompt difficulty for adaptive reasoning compression.
# Easy prompts → compressed reasoning; Hard prompts → full reasoning chains.
# Informed by OPSDC (arxiv:2603.05433).
difficulty_signal:
  mode: "shadow"           # off|shadow|enforce — start in shadow for telemetry
  # Thresholds recalibrated 2026-04-06 from Package A telemetry (635 requests):
  # Old: easy<0.3, hard>0.6 → 92.3% easy, 7.7% medium, 0% hard (useless)
  # New: easy<0.15, hard>0.35 → ~40% easy, ~40% medium, ~20% hard (actionable)
  threshold_easy: 0.15
  threshold_hard: 0.35
  feature_weights:
    prompt_length_tokens: 0.15
    multi_step_indicators: 0.20
    constraint_count: 0.15
    code_presence: 0.10
    math_presence: 0.10
    nesting_depth: 0.15
    ambiguity_markers: 0.15
