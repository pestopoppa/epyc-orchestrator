# ─────────────────────────────────────────────────────────────────────
# METADATA
# ─────────────────────────────────────────────────────────────────────

metadata:
  quality_scale: "0-100% accuracy/pass rate per suite"
  baseline_sample_size: "635 routing decisions (Package A), expanding with Package B"

  suite_definitions:
    math: "MATH-500 (algebra, geometry, olympiad), GSM8K"
    coder: "SWE-bench, code generation tasks"
    gpqa: "GPQA dataset (hard science MCQ)"
    agentic: "Tool use, task decomposition, web search"
    general: "Factual QA, reasoning, mixed domains"
    thinking: "Questions requiring explicit reasoning traces"
    hotpotqa: "Multi-hop question answering"
    simpleqa: "Factual recall, single-hop"
    instruction_precision: "Output format constraints (JSON, lists, etc.)"
    long_context: "Document summarization, 10K+ context"

  notes:
    - "Throughput is single-instance maximum (not aggregate across NUMA instances)"
    - "Scores are aggregated from sentinel evaluations; per-suite may vary by eval methodology"
    - "quality_baseline_score is system-level (used for autopilot regression gates)"
    - "Model signatures are for hypothesis assessment; actual trial results override"
    - "Update from Package B/C results as they complete"
