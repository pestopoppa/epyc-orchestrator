# Model Quality Signatures for AutoPilot
#
# Per-model performance baselines: max single-instance throughput + per-suite quality.
# Used by autopilot controller to assess routing strategies and hypothesis plausibility.
#
# Last updated: 2026-04-16
#
# Schema:
#   model_name:
#     max_throughput_tps: X  # single instance max throughput
#     quality_baseline_score: X/3.0  # overall quality score (used for regression detection)
#     per_suite:
#       suite_name: XX%  # accuracy/pass rate on that suite

models:
  # ─────────────────────────────────────────────────────────────────────
  # ACTIVE PRODUCTION STACK
  # ─────────────────────────────────────────────────────────────────────

