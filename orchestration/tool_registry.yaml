# Tool Registry - Callable tools for orchestration
# Each tool has: name, description, parameters, implementation, permissions

metadata:
  version: "1.0"
  description: "Registry of callable tools for REPL and agent use"
  categories:
    - web        # HTTP, search, scrape
    - data       # JSON, CSV, SQL, transform
    - code       # lint, format, test, git
    - math       # numerical, symbolic, statistics
    - system     # files, processes, environment
    - llm        # embeddings, completions, classification

tools:
  # ============ WEB TOOLS ============
  http_get:
    category: web
    description: "Fetch content from a URL via HTTP GET"
    parameters:
      url: {type: string, required: true, description: "URL to fetch"}
      headers: {type: object, required: false, description: "Optional headers"}
      timeout: {type: integer, required: false, default: 30, description: "Timeout in seconds"}
    returns: {type: object, fields: [status_code, headers, body, elapsed_ms]}
    implementation:
      type: python
      module: orchestration.tools.web
      function: http_get
    permissions: [network]
    examples:
      - input: {url: "https://api.github.com/repos/python/cpython"}
        description: "Fetch GitHub repo metadata"

  http_post:
    category: web
    description: "Send data to a URL via HTTP POST"
    parameters:
      url: {type: string, required: true}
      data: {type: object, required: false, description: "JSON body"}
      headers: {type: object, required: false}
      timeout: {type: integer, required: false, default: 30}
    returns: {type: object, fields: [status_code, headers, body, elapsed_ms]}
    implementation:
      type: python
      module: orchestration.tools.web
      function: http_post
    permissions: [network]

  web_search:
    category: web
    description: "Search the web using DuckDuckGo (no API key needed)"
    parameters:
      query: {type: string, required: true, description: "Search query"}
      max_results: {type: integer, required: false, default: 10}
      region: {type: string, required: false, default: "wt-wt", description: "Region code"}
    returns: {type: array, items: {type: object, fields: [title, url, snippet]}}
    implementation:
      type: python
      module: orchestration.tools.web
      function: web_search
    permissions: [network]
    examples:
      - input: {query: "Python asyncio tutorial", max_results: 5}
        description: "Search for Python tutorials"

  fetch_wikipedia:
    category: web
    description: "Fetch Wikipedia article summary"
    parameters:
      title: {type: string, required: true, description: "Article title"}
      sentences: {type: integer, required: false, default: 5}
    returns: {type: object, fields: [title, summary, url, categories]}
    implementation:
      type: python
      module: orchestration.tools.web
      function: fetch_wikipedia
    permissions: [network]

  # --- Knowledge retrieval tools (free APIs, no keys) ---

  search_arxiv:
    category: web
    description: "Search arXiv for academic papers by keyword, author, or topic"
    parameters:
      query: {type: string, required: true, description: "Search query (supports arXiv syntax)"}
      max_results: {type: integer, required: false, default: 10}
    returns: {type: array, items: {type: object, fields: [title, authors, abstract, arxiv_id, published, pdf_url, categories]}}
    implementation:
      type: python
      module: src.tools.knowledge
      function: search_arxiv
    permissions: [network]
    examples:
      - input: {query: "transformer attention mechanism", max_results: 5}
        description: "Search for papers on transformer attention"

  search_papers:
    category: web
    description: "Search Semantic Scholar for academic papers with citation data"
    parameters:
      query: {type: string, required: true, description: "Search query"}
      max_results: {type: integer, required: false, default: 10}
      year_range: {type: string, required: false, description: "Year range filter (e.g. 2020-2025)"}
    returns: {type: array, items: {type: object, fields: [title, authors, abstract, citation_count, year, doi, venue]}}
    implementation:
      type: python
      module: src.tools.knowledge
      function: search_papers
    permissions: [network]
    examples:
      - input: {query: "speculative decoding LLM", year_range: "2023-2026"}
        description: "Search for recent speculative decoding papers"

  search_wikipedia:
    category: web
    description: "Search Wikipedia for articles matching a query (returns summaries)"
    parameters:
      query: {type: string, required: true, description: "Search query"}
      max_results: {type: integer, required: false, default: 5}
      language: {type: string, required: false, default: "en", description: "Wikipedia language code"}
    returns: {type: array, items: {type: object, fields: [title, summary, url, page_id]}}
    implementation:
      type: python
      module: src.tools.knowledge
      function: search_wikipedia
    permissions: [network]

  get_wikipedia_article:
    category: web
    description: "Fetch the full text of a Wikipedia article by title"
    parameters:
      title: {type: string, required: true, description: "Exact article title"}
      language: {type: string, required: false, default: "en", description: "Wikipedia language code"}
    returns: {type: object, fields: [title, full_text, url, categories, sections]}
    implementation:
      type: python
      module: src.tools.knowledge
      function: get_wikipedia_article
    permissions: [network]

  search_books:
    category: web
    description: "Search Google Books for publications"
    parameters:
      query: {type: string, required: true, description: "Search query"}
      max_results: {type: integer, required: false, default: 10}
      filter: {type: string, required: false, description: "Filter: ebooks, free-ebooks, paid-ebooks, partial, full"}
    returns: {type: array, items: {type: object, fields: [title, authors, publisher, published_date, description, isbn, preview_link]}}
    implementation:
      type: python
      module: src.tools.knowledge
      function: search_books
    permissions: [network]
    examples:
      - input: {query: "machine learning optimization", filter: "ebooks"}
        description: "Search for ML optimization ebooks"

  # ============ DATA TOOLS ============
  json_query:
    category: data
    description: "Query JSON data using JMESPath expressions"
    parameters:
      data: {type: object, required: true, description: "JSON data to query"}
      query: {type: string, required: true, description: "JMESPath expression"}
    returns: {type: any, description: "Query result"}
    implementation:
      type: python
      module: orchestration.tools.data
      function: json_query
    permissions: []
    examples:
      - input: {data: {users: [{name: "Alice"}, {name: "Bob"}]}, query: "users[*].name"}
        description: "Extract all user names"

  csv_to_json:
    category: data
    description: "Convert CSV data to JSON array"
    parameters:
      csv_content: {type: string, required: true, description: "CSV string"}
      delimiter: {type: string, required: false, default: ","}
      has_header: {type: boolean, required: false, default: true}
    returns: {type: array, items: {type: object}}
    implementation:
      type: python
      module: orchestration.tools.data
      function: csv_to_json
    permissions: []

  json_to_csv:
    category: data
    description: "Convert JSON array to CSV"
    parameters:
      data: {type: array, required: true, description: "Array of objects"}
      columns: {type: array, required: false, description: "Column order (optional)"}
    returns: {type: string, description: "CSV content"}
    implementation:
      type: python
      module: orchestration.tools.data
      function: json_to_csv
    permissions: []

  sql_query:
    category: data
    description: "Execute SQL query on in-memory SQLite database"
    parameters:
      query: {type: string, required: true, description: "SQL query"}
      tables: {type: object, required: false, description: "Dict of table_name -> list of dicts"}
    returns: {type: array, description: "Query results as list of dicts"}
    implementation:
      type: python
      module: orchestration.tools.data
      function: sql_query
    permissions: []
    examples:
      - input:
          query: "SELECT name, age FROM users WHERE age > 25"
          tables: {users: [{name: "Alice", age: 30}, {name: "Bob", age: 20}]}
        description: "Query in-memory data with SQL"

  # ============ CODE TOOLS ============
  python_eval:
    category: code
    description: "Evaluate a Python expression safely"
    parameters:
      expression: {type: string, required: true, description: "Python expression"}
      variables: {type: object, required: false, description: "Variables to inject"}
    returns: {type: any}
    implementation:
      type: python
      module: orchestration.tools.code
      function: python_eval
    permissions: [compute]
    examples:
      - input: {expression: "sum(range(100))", variables: {}}
        description: "Calculate sum of 0-99"

  run_shell:
    category: code
    description: "Execute a shell command (sandboxed)"
    parameters:
      command: {type: string, required: true}
      timeout: {type: integer, required: false, default: 30}
      cwd: {type: string, required: false}
    returns: {type: object, fields: [stdout, stderr, returncode, elapsed_ms]}
    implementation:
      type: python
      module: orchestration.tools.code
      function: run_shell
    permissions: [shell]

  git_status:
    category: code
    description: "Get git repository status"
    parameters:
      repo_path: {type: string, required: false, default: ".", description: "Path to repo"}
    returns: {type: object, fields: [branch, modified, staged, untracked]}
    implementation:
      type: python
      module: orchestration.tools.code
      function: git_status
    permissions: [filesystem]

  lint_python:
    category: code
    description: "Lint Python code using ruff"
    parameters:
      code: {type: string, required: true, description: "Python code to lint"}
      fix: {type: boolean, required: false, default: false}
    returns: {type: object, fields: [issues, fixed_code, summary]}
    implementation:
      type: python
      module: orchestration.tools.code
      function: lint_python
    permissions: [compute]

  # ============ MATH TOOLS (Python) ============
  calculate:
    category: math
    description: "Evaluate mathematical expression"
    parameters:
      expression: {type: string, required: true, description: "Math expression (numpy available)"}
    returns: {type: number}
    implementation:
      type: python
      module: orchestration.tools.math
      function: calculate
    permissions: [compute]
    examples:
      - input: {expression: "np.sin(np.pi/4) * np.sqrt(2)"}
        description: "Calculate sin(π/4) × √2"

  statistics:
    category: math
    description: "Calculate statistics for a dataset"
    parameters:
      data: {type: array, required: true, description: "Array of numbers"}
      metrics: {type: array, required: false, default: ["mean", "std", "min", "max", "median"]}
    returns: {type: object, description: "Calculated statistics"}
    implementation:
      type: python
      module: orchestration.tools.math
      function: statistics
    permissions: [compute]

  monte_carlo:
    category: math
    description: "Run Monte Carlo simulation"
    parameters:
      expression: {type: string, required: true, description: "Expression to evaluate (use 'x' for random)"}
      samples: {type: integer, required: false, default: 10000}
      distribution: {type: string, required: false, default: "uniform", description: "uniform, normal, exponential"}
    returns: {type: object, fields: [mean, std, percentiles, histogram]}
    implementation:
      type: python
      module: orchestration.tools.math
      function: monte_carlo
    permissions: [compute]
    examples:
      - input: {expression: "x**2", samples: 100000, distribution: "uniform"}
        description: "Estimate E[X²] where X ~ Uniform(0,1)"

  symbolic_solve:
    category: math
    description: "Solve equation symbolically using SymPy"
    parameters:
      equation: {type: string, required: true, description: "Equation (use 'x' as variable)"}
      variable: {type: string, required: false, default: "x"}
    returns: {type: array, description: "Solutions"}
    implementation:
      type: python
      module: orchestration.tools.math
      function: symbolic_solve
    permissions: [compute]
    examples:
      - input: {equation: "x**2 - 5*x + 6"}
        description: "Solve x² - 5x + 6 = 0"

  # ============ MATH TOOLS (C++ Native) ============
  # These call the llama-math-tools binary for high-performance computation
  # Binary: /mnt/raid0/llm/llama.cpp/build/bin/llama-math-tools

  matrix_solve:
    category: math
    description: "Solve linear system Ax=b using QR decomposition (C++ Eigen)"
    parameters:
      A: {type: array, required: true, description: "Coefficient matrix (n×n)"}
      b: {type: array, required: true, description: "Right-hand side vector (n)"}
    returns: {type: object, fields: [x, relative_error]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: matrix_op
    permissions: [compute]
    examples:
      - input: {A: [[3, 1], [1, 2]], b: [9, 8]}
        output: {x: [2.0, 3.0]}
        description: "Solve 3x+y=9, x+2y=8"

  matrix_eigenvalues:
    category: math
    description: "Compute eigenvalues and optionally eigenvectors (C++ Eigen)"
    parameters:
      A: {type: array, required: true, description: "Square matrix (n×n)"}
      vectors: {type: boolean, required: false, default: false, description: "Also return eigenvectors"}
    returns: {type: object, fields: [eigenvalues, eigenvectors]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: matrix_op
    permissions: [compute]

  matrix_svd:
    category: math
    description: "Singular Value Decomposition (C++ Eigen)"
    parameters:
      A: {type: array, required: true, description: "Matrix (m×n)"}
      full: {type: boolean, required: false, default: false}
    returns: {type: object, fields: [singular_values, U, V, rank]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: matrix_op
    permissions: [compute]

  solve_ode:
    category: math
    description: "Solve ODE dy/dt=f(t,y) with adaptive RK45 (C++ Boost.Odeint)"
    parameters:
      y0: {type: array, required: true, description: "Initial conditions"}
      t_span: {type: array, required: true, description: "[t_start, t_end]"}
      coefficients: {type: object, required: false, description: "Linear system {A, b}"}
      system: {type: string, required: false, description: "Expression like '-0.5*y'"}
      rtol: {type: number, required: false, default: 1e-6}
      atol: {type: number, required: false, default: 1e-9}
    returns: {type: object, fields: [t, y, stats]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: solve_ode
    permissions: [compute]
    examples:
      - input: {y0: [1.0], t_span: [0, 5], system: "-0.5*y"}
        description: "Exponential decay dy/dt = -0.5y, y(0)=1"

  optimize:
    category: math
    description: "Minimize/maximize function using Nelder-Mead or gradient descent"
    parameters:
      x0: {type: array, required: true, description: "Initial guess"}
      objective: {type: object, required: true, description: "Quadratic {A,b,c} or named function"}
      method: {type: string, required: false, default: "nelder_mead"}
      mode: {type: string, required: false, default: "minimize"}
      max_iter: {type: integer, required: false, default: 1000}
    returns: {type: object, fields: [x, f, iterations, converged]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: optimize
    permissions: [compute]

  monte_carlo_native:
    category: math
    description: "High-performance Monte Carlo integration (C++ OpenMP parallel)"
    parameters:
      bounds: {type: array, required: true, description: "Integration bounds [[a1,b1], [a2,b2], ...]"}
      function: {type: string, required: false, default: "constant", description: "sphere, gaussian, polynomial"}
      n_samples: {type: integer, required: false, default: 10000}
      seed: {type: integer, required: false, default: 42}
    returns: {type: object, fields: [integral, standard_error, samples_used]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: monte_carlo
    permissions: [compute]
    examples:
      - input: {bounds: [[-1, 1], [-1, 1]], function: "sphere", n_samples: 100000}
        description: "Estimate area of unit circle (≈π)"

  mcmc:
    category: math
    description: "Metropolis-Hastings MCMC sampler (C++)"
    parameters:
      log_density: {type: string, required: true, description: "Log density expression (vars: x0, x1, ...)"}
      x0: {type: array, required: true, description: "Initial state"}
      n_samples: {type: integer, required: false, default: 10000}
      proposal_std: {type: number, required: false, default: 1.0}
      burnin: {type: integer, required: false, default: 1000}
      seed: {type: integer, required: false, default: 42}
    returns: {type: object, fields: [samples, acceptance_rate, mean, covariance]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: mcmc
    permissions: [compute]
    examples:
      - input: {log_density: "-0.5*(x0**2 + x1**2)", x0: [0, 0], n_samples: 5000}
        description: "Sample from 2D standard normal"

  bayesopt:
    category: math
    description: "Bayesian optimization with Gaussian process (C++)"
    parameters:
      bounds: {type: array, required: true, description: "Parameter bounds [[min, max], ...]"}
      objective: {type: string, required: true, description: "Expression to maximize"}
      n_init: {type: integer, required: false, default: 5, description: "Initial random samples"}
      n_iter: {type: integer, required: false, default: 25, description: "Optimization iterations"}
      acquisition: {type: string, required: false, default: "ei", description: "ei, ucb, pi"}
    returns: {type: object, fields: [x_best, y_best, history, model]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: bayesopt
    permissions: [compute]

  # ============ VISUALIZATION TOOLS (C++ Native) ============
  plot_braille:
    category: data
    description: "Create braille character plot for terminal (C++)"
    parameters:
      x: {type: array, required: true, description: "X coordinates"}
      y: {type: array, required: true, description: "Y coordinates"}
      plot_type: {type: string, required: false, default: "line", description: "scatter, line"}
      width: {type: integer, required: false, default: 80}
      height: {type: integer, required: false, default: 20}
      title: {type: string, required: false, default: "Plot"}
    returns: {type: object, fields: [plot, x_range, y_range]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: plot
    permissions: [compute]

  plot_function:
    category: data
    description: "Plot mathematical function (sin, cos, exp, etc.)"
    parameters:
      function: {type: string, required: true, description: "sin, cos, exp, log, x^2, x^3, sqrt, tanh, sigmoid, gaussian"}
      x_min: {type: number, required: false, default: -3.14159}
      x_max: {type: number, required: false, default: 3.14159}
      width: {type: integer, required: false, default: 80}
      height: {type: integer, required: false, default: 20}
    returns: {type: object, fields: [plot, x_range, y_range]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: plot
    permissions: [compute]

  histogram:
    category: data
    description: "Create histogram from data (C++)"
    parameters:
      data: {type: array, required: true, description: "Data values"}
      bins: {type: integer, required: false, default: 20}
      width: {type: integer, required: false, default: 80}
      height: {type: integer, required: false, default: 20}
    returns: {type: object, fields: [plot, n_bins, bin_edges]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: plot
    permissions: [compute]

  plot_sixel:
    category: data
    description: "Create high-resolution sixel graphics plot (C++)"
    parameters:
      x: {type: array, required: true, description: "X coordinates"}
      y: {type: array, required: true, description: "Y coordinates"}
      plot_type: {type: string, required: false, default: "line"}
      width: {type: integer, required: false, default: 800, description: "Pixel width"}
      height: {type: integer, required: false, default: 400, description: "Pixel height"}
      title: {type: string, required: false}
      colors: {type: array, required: false, description: "Color palette"}
    returns: {type: object, fields: [sixel, format, dimensions]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: plot_sixel
    permissions: [compute]

  render_math:
    category: data
    description: "Render LaTeX to Unicode/ASCII (C++)"
    parameters:
      latex: {type: string, required: true, description: "LaTeX expression"}
      format: {type: string, required: false, default: "unicode", description: "unicode or ascii"}
    returns: {type: object, fields: [rendered, original]}
    implementation:
      type: cpp
      binary: llama-math-tools
      command: render_math
    permissions: [compute]
    examples:
      - input: {latex: "\\frac{d^2y}{dx^2} + \\omega^2 y = 0"}
        output: {rendered: "d²y/dx² + ω²y = 0"}
        description: "Render harmonic oscillator equation"

  # ============ SYSTEM TOOLS ============
  read_file:
    category: system
    description: "Read file contents"
    parameters:
      path: {type: string, required: true}
      encoding: {type: string, required: false, default: "utf-8"}
      max_bytes: {type: integer, required: false, default: 1000000}
    returns: {type: object, fields: [content, size, modified]}
    implementation:
      type: python
      module: orchestration.tools.system
      function: read_file
    permissions: [filesystem]

  write_file:
    category: system
    description: "Write content to file"
    parameters:
      path: {type: string, required: true}
      content: {type: string, required: true}
      mode: {type: string, required: false, default: "w", description: "w=overwrite, a=append"}
    returns: {type: object, fields: [bytes_written, path]}
    implementation:
      type: python
      module: orchestration.tools.system
      function: write_file
    permissions: [filesystem]

  list_directory:
    category: system
    description: "List directory contents"
    parameters:
      path: {type: string, required: true}
      pattern: {type: string, required: false, default: "*"}
      recursive: {type: boolean, required: false, default: false}
    returns: {type: array, items: {type: object, fields: [name, path, type, size, modified]}}
    implementation:
      type: python
      module: orchestration.tools.system
      function: list_directory
    permissions: [filesystem]

  get_current_date:
    category: system
    description: "Get current date in ISO format with weekday"
    parameters: {}
    returns: {type: object, fields: [date, weekday, year, month, day]}
    implementation:
      type: python
      module: orchestration.tools.system
      function: get_current_date
    permissions: []

  get_current_time:
    category: system
    description: "Get current date, time, and UTC timestamp"
    parameters: {}
    returns: {type: object, fields: [datetime, date, time, utc, timestamp]}
    implementation:
      type: python
      module: orchestration.tools.system
      function: get_current_time
    permissions: []

  # ============ ARCHIVE TOOLS ============
  archive_open:
    category: system
    description: "Open an archive and return its manifest (zip, tar, tar.gz, 7z)"
    parameters:
      path: {type: string, required: true, description: "Path to archive file"}
    returns: {type: object, fields: [total_files, total_size, types, recommendation, nested_archives]}
    implementation:
      type: python
      module: src.services.archive_extractor
      function: archive_open
    permissions: [filesystem]
    examples:
      - input: {path: "/mnt/raid0/llm/uploads/documents.zip"}
        description: "Open archive and view contents"

  archive_extract:
    category: system
    description: "Extract files from an opened archive"
    parameters:
      archive_name: {type: string, required: false, description: "Archive name (uses most recent if omitted)"}
      pattern: {type: string, required: false, description: "Glob pattern (e.g., *.pdf)"}
      files: {type: array, required: false, description: "Specific files to extract"}
      process_documents: {type: boolean, required: false, default: true, description: "Route PDFs through OCR"}
    returns: {type: object, fields: [extracted, processed, sections_total, stored_in]}
    implementation:
      type: python
      module: src.services.archive_extractor
      function: archive_extract
    permissions: [filesystem]
    examples:
      - input: {pattern: "*.pdf", process_documents: true}
        description: "Extract and OCR all PDFs"

  archive_file:
    category: system
    description: "Get content of a specific file from an extracted archive"
    parameters:
      filename: {type: string, required: true, description: "Path within archive"}
      archive_name: {type: string, required: false, description: "Archive name (searches all if omitted)"}
    returns: {type: string, description: "File content or document metadata"}
    implementation:
      type: python
      module: src.services.archive_extractor
      function: archive_file
    permissions: [filesystem]

  archive_search:
    category: system
    description: "Search across all extracted archive content"
    parameters:
      query: {type: string, required: true, description: "Search query"}
      archive_name: {type: string, required: false, description: "Archive to search (all if omitted)"}
    returns: {type: array, items: {type: object, fields: [file, line, section, match]}}
    implementation:
      type: python
      module: src.services.archive_extractor
      function: archive_search
    permissions: [filesystem]
    examples:
      - input: {query: "authentication"}
        description: "Search for authentication across all extracted files"

  # ============ LLM TOOLS ============
  embed_text:
    category: llm
    description: "Generate embedding for text"
    parameters:
      text: {type: string, required: true}
    returns: {type: array, description: "Embedding vector"}
    implementation:
      type: python
      module: orchestration.tools.llm
      function: embed_text
    permissions: [compute]

  similarity_search:
    category: llm
    description: "Find similar items by embedding"
    parameters:
      query: {type: string, required: true}
      items: {type: array, required: true, description: "Array of strings to search"}
      top_k: {type: integer, required: false, default: 5}
    returns: {type: array, items: {type: object, fields: [item, score, index]}}
    implementation:
      type: python
      module: orchestration.tools.llm
      function: similarity_search
    permissions: [compute]

  classify_text:
    category: llm
    description: "Classify text into categories"
    parameters:
      text: {type: string, required: true}
      categories: {type: array, required: true, description: "Possible categories"}
    returns: {type: object, fields: [category, confidence, scores]}
    implementation:
      type: python
      module: orchestration.tools.llm
      function: classify_text
    permissions: [compute]

# Permission definitions
permissions:
  network:
    description: "Can make network requests"
    requires_approval: false
  filesystem:
    description: "Can read/write files"
    requires_approval: true
    allowed_paths: ["/mnt/raid0/llm/", "/tmp/"]
  shell:
    description: "Can execute shell commands"
    requires_approval: true
  compute:
    description: "Can execute computation"
    requires_approval: false
