- id: sentinel_general_02
  suite: general
  prompt: "When a claim is supported only by asserting that unidentified experts accept the claim the arguer has committed which of the following fallacies?\n\nA) appeal to tradition\nB) ad vericundiam\nC) appeal to anonymous authority\nD) snob appeal\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "C"
  scoring_method: multiple_choice
  scoring_config: {}

- id: sentinel_general_03
  suite: general
  prompt: "If you think that someone's argument is strong based on their compelling use of language and confident delivery, you've probably committed which fallacy?\n\nA) Amphiboly\nB) Equivocation\nC) Special pleading\nD) Style over substance\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "D"
  scoring_method: multiple_choice
  scoring_config: {}

- id: sentinel_general_04
  suite: general
  prompt: "___________ is based on the idea that customer expectations of the service they will receive shape their perception of the actual service encounter.\n\nA) Service quality.\nB) Service action.\nC) Service recovery.\nD) Service satisfaction.\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "A"
  scoring_method: multiple_choice
  scoring_config: {}

