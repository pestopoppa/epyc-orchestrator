- id: sentinel_thinking_02
  suite: thinking
  prompt: "Choose the most plausible continuation:\n\nContext: A view is seen of snow covered ground and people on the ice. A man sets up a fishing line in a hole in a lake. he\n\nA) then pulls a fish through the hole.\nB) reels in the fish and catches a bigger fish.\nC) reels in the hook and begins reeling in the fish.\nD) stands and catches a fish and throws it in the hole with the other fish.\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "A"
  scoring_method: multiple_choice
  scoring_config: {}

- id: sentinel_thinking_03
  suite: thinking
  prompt: "Choose the most plausible continuation:\n\nContext: A woman is ironing something on an ironing board. She sets the iron down and talks to the camera. A laptop is shown on a table. she\n\nA) puts down an iron and starts to iron a towel.\nB) picks up the iron and continues to iron.\nC) mixes ingredients together in a bowl then returns to ironing.\nD) is talking and twist a tool in her hands.\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "B"
  scoring_method: multiple_choice
  scoring_config: {}

- id: sentinel_thinking_04
  suite: thinking
  prompt: "Choose the most plausible continuation:\n\nContext: A man is sitting in a barber chair. Another man is giving him a hair cut. he\n\nA) takes the hair over the scissors.\nB) then has him cut and styled.\nC) shows off his trimmed hair from a man sitting behind him.\nD) then brushes off the mans neck.\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "D"
  scoring_method: multiple_choice
  scoring_config: {}

