# ═══════════════════════════════════════════════════════════════════
# TIER 1 — Multi-hop reasoning (HotpotQA with context)
# ═══════════════════════════════════════════════════════════════════

- id: sentinel_multihop_02
  suite: hotpotqa
  prompt: "Context:\n### Stauntonia\nStauntonia is a genus of flowering plant in the Lardizabalaceae family. It is named after George Staunton, who brought it to Britain from China in the 19th Century.\n\n### Sinofranchetia\nSinofranchetia is a genus of flowering plant in the Lardizabalaceae family. It contains a single species, Sinofranchetia chinensis.\n\nQuestion: What family are the genera Sinofranchetia and Stauntonia from?\n\nGive a short, precise answer based on the context. Put your final answer after ####."
  expected: "Lardizabalaceae"
  scoring_method: f1
  scoring_config: {}

- id: sentinel_multihop_03
  suite: hotpotqa
  prompt: "Context:\n### Canton of St. Gallen\nThe canton of St. Gallen is a canton of Switzerland. The capital is St. Gallen.\n\n### Selun\nThe Selun is one of the peaks of the Churfirsten range, located in the Appenzell Alps. It lies between the valley of Toggenburg and Lake Walenstadt in the canton of St. Gallen.\n\nQuestion: What country is the Selun located in?\n\nGive a short, precise answer based on the context. Put your final answer after ####."
  expected: "Switzerland"
  scoring_method: f1
  scoring_config: {}

- id: sentinel_multihop_04
  suite: hotpotqa
  prompt: "Context:\n### Boltonia\nBoltonia is a genus of plants in the sunflower family native primarily to North America with one species in eastern Asia.\n\n### Disporum\nDisporum (commonly known as fairy bells) is a genus of about 20 species of perennial flowering plants, found in Asia.\n\nQuestion: Which has more species in Asia, Disporum or Boltonia?\n\nGive a short, precise answer based on the context. Put your final answer after ####."
  expected: "Disporum"
  scoring_method: f1
  scoring_config: {}

