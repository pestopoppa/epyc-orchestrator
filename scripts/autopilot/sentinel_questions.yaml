# Sentinel questions for autopilot evaluation.
# Expanded from 10 to 38 questions (2026-04-09) to prevent q=3.0 saturation.
#
# Original 10 (easy, T0) retained for regression baseline.
# New 28 span harder difficulty tiers (GPQA, olympiad math, multi-hop,
# tool-use reasoning) to give AR-3 scoring headroom.
#
# Sources: HF benchmark suites via question_pool.jsonl, NOT debug suites.
# Each question has a clear expected answer for automated scoring.

# ═══════════════════════════════════════════════════════════════════
# TIER 0 — Original 10 (easy baseline, retained for regression)
# ═══════════════════════════════════════════════════════════════════

# 1. General knowledge (frontdoor direct)
- id: sentinel_general_01
  suite: general
  prompt: "What is the capital of Australia?"
  expected: "Canberra"
  scoring_method: substring
  scoring_config: {}

# 2. Math reasoning (worker math)
- id: sentinel_math_01
  suite: math
  prompt: "What is the value of 3^4 + 4^3?"
  expected: "145"
  scoring_method: substring
  scoring_config: {}

# 3. Code generation (REPL path)
- id: sentinel_code_01
  suite: coder
  prompt: "Write a Python function that returns the nth Fibonacci number using memoization. Return just the function."
  expected: "def fibonacci"
  scoring_method: substring
  scoring_config: {}

# 4. Multi-step reasoning (thinking path)
- id: sentinel_thinking_01
  suite: thinking
  prompt: "A train travels from City A to City B at 60 km/h and returns at 40 km/h. What is the average speed for the round trip?"
  expected: "48"
  scoring_method: substring
  scoring_config: {}

# 5. Instruction following (frontdoor with constraints)
- id: sentinel_instruction_01
  suite: instruction_precision
  prompt: "List exactly 3 primary colors, separated by commas, with no other text."
  expected: "red"
  scoring_method: substring
  scoring_config: {}

# 6. Long context / summarization
- id: sentinel_longctx_01
  suite: long_context
  prompt: "Summarize the key differences between TCP and UDP protocols in exactly 2 sentences."
  expected: "TCP"
  scoring_method: substring
  scoring_config: {}

# 7. Agentic (tool use path)
- id: sentinel_agentic_01
  suite: agentic
  prompt: "Calculate the factorial of 12 step by step and give the final result."
  expected: "479001600"
  scoring_method: substring
  scoring_config: {}

# 8. HotpotQA-style multi-hop
- id: sentinel_multihop_01
  suite: hotpotqa
  prompt: "If water boils at 100°C at sea level, and the boiling point decreases by about 0.5°C per 150m of altitude, approximately what temperature does water boil at 3000m altitude?"
  expected: "90"
  scoring_method: substring
  scoring_config: {}

# 9. SimpleQA factual
- id: sentinel_factual_01
  suite: simpleqa
  prompt: "In what year was the Python programming language first released?"
  expected: "1991"
  scoring_method: substring
  scoring_config: {}

# 10. Escalation-requiring (complex)
- id: sentinel_escalation_01
  suite: mode_advantage_hard
  prompt: "Explain the difference between strong and weak typing in programming languages, giving one example of each type of language."
  expected: "Python"
  scoring_method: substring
  scoring_config: {}

# ═══════════════════════════════════════════════════════════════════
# TIER 1 — Hard science (GPQA, graduate-level)
# ═══════════════════════════════════════════════════════════════════

- id: sentinel_gpqa_01
  suite: gpqa
  prompt: "In order to calculate the necessary beam to produce a particle X, we ran the following simulation in a High Energy software $e^{+}e^{-}\\rightarrow X$, where the electron $e^{-}$ is at rest. We found that the beam energy has to be at least equal to $9.6\\times10^{6}$ GeV.\nWhat is the mass of the particle X used for this simulation?\n\nA) 1091 GeV\nB) 99 GeV\nC) 542 GeV\nD) 3132 GeV\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "B"
  scoring_method: multiple_choice
  scoring_config: {}

- id: sentinel_gpqa_02
  suite: gpqa
  prompt: "A chemist performed two reactions by taking two unknown compounds and treated them separately with two different reducing agents. Select the proper starting material for both of the reactions.\nA + LiBH4 + H+ ---> (R)-4-ethyltetrahydro-2H-pyran-2-one\nB + BH3 + H+ ---> (S)-4-ethyltetrahydro-2H-pyran-2-one\n\nA) A = (R)-3-ethyl-5-isobutoxy-5-oxopentanoic acid, B = (S)-3-ethyl-5-isobutoxy-5-oxopentanoic acid\nB) A = (S)-3-ethyl-5-isobutoxy-5-oxopentanoic acid, B = (R)-3-ethyl-5-isobutoxy-5-oxopentanoic acid\nC) A = (R)-3-ethyl-5-isobutoxy-5-oxopentanoic acid , B = (R)-3-ethyl-5-isobutoxy-5-oxopentanoic acid\nD) A = (S)-3-ethyl-5-isobutoxy-5-oxopentanoic acid , B = (S)-3-ethyl-5-isobutoxy-5-oxopentanoic acid\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "D"
  scoring_method: multiple_choice
  scoring_config: {}

- id: sentinel_gpqa_03
  suite: gpqa
  prompt: "When saturated epoxides are reacted with organocuprates, the alkyl group of the reagent is always introduced at less hindered carbon of the epoxide ring. In the disubstituted epoxides, inversion of configuration occurs at a carbon to which Nu is added. Identify the product when (1R,3R,4R,6S)-1,3,4-trimethyl-7-oxabicyclo [4.1.0] heptane is reacted with Me2CuLi:\n\nA) (1R,2S,4R,5R)-1,2,4,5-tetramethylcyclohexan-1-ol\nB) (1R,2R,4R,5R)-1,2,4,5-tetramethylcyclohexan-1-ol\nC) (1R,4R,5R)-2,2,4,5-tetramethylcyclohexan-1-ol\nD) (1S,4R,5S)-2,2,4,5-tetramethylcyclohexan-1-ol\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "B"
  scoring_method: multiple_choice
  scoring_config: {}

- id: sentinel_gpqa_04
  suite: gpqa
  prompt: "Compounds that have the same molecular formula but are different in their structural arrangement are known as isomers. Isomers have two types, constitutional isomers and stereoisomers. Constitutional isomers have the same molecular formula but differ in their structures. In stereoisomers, molecules are connected in the same way, but their arrangements in space are different.\nWhich of the following organic moieties show optical isomerism?\n\n1. dimethyl 6,6'-dinitro-[1,1'-biphenyl]-2,2'-dicarboxylate\n2. methyl 2-hydroxypropanoate\n3. benzophenone\n4. dimethyl fumarate\n\nA) 3 and 4\nB) 1, 2 and 4\nC) 2 and 3\nD) 1 and 2\n\nAnswer with the letter only (A, B, C, or D)."
  expected: "D"
  scoring_method: multiple_choice
  scoring_config: {}

# ═══════════════════════════════════════════════════════════════════
# TIER 1 — Hard math (olympiad + multi-step)
# ═══════════════════════════════════════════════════════════════════

- id: sentinel_math_02
  suite: math
  prompt: "Nik has 200 crayons. He wants to separate them into groups of 8 and put them into boxes. Each box weighs 8 ounces. Each crayon weighs 1 ounce. If he puts all of his crayons into boxes, what is the total weight, in pounds, of the crayons and the boxes, when there are 16 ounces to a pound?\n\nSolve step by step. Put your final numeric answer after ####."
  expected: "25"
  scoring_method: exact_match
  scoring_config: {}

- id: sentinel_math_03
  suite: math
  prompt: "There are 26 countries in South America and, in each country, there are 5 cities with 1000 people living in each city. If the whole population lives in these cities, how many people are there in South America?\n\nSolve step by step. Put your final numeric answer after ####."
  expected: "130000"
  scoring_method: exact_match
  scoring_config: {}

- id: sentinel_math_04
  suite: math
  prompt: "For what real values of $x$ is $-4<x^{4}+4x^{2}<21$ satisfied? Express your answer in interval notation.\n\nPut your final answer in \\boxed{}."
  expected: "(-\\sqrt{3}, \\sqrt{3})"
  scoring_method: substring
  scoring_config: {}

- id: sentinel_math_05
  suite: math
  prompt: "In quadrilateral $ABCD$, $m\\angle B + m\\angle D = 270^{\\circ}$. The circumcircle of $\\triangle ABD$ intersects $\\overline{CD}$ at point $E$, distinct from $D$. Given that $BC=4, CE=5$, and $DE=7$, compute the diameter of the circumcircle of $\\triangle ABD$.\n\nSolve step by step. Put your final answer in \\boxed{}."
  expected: "\\sqrt{130}"
  scoring_method: substring
  scoring_config: {}

- id: sentinel_math_06
  suite: math
  prompt: "Let $N=888{,}888 \\times 9{,}999{,}999$. Compute the sum of the digits of $N$.\n\nSolve step by step. Put your final answer in \\boxed{}."
  expected: "63"
  scoring_method: substring
  scoring_config: {}

# ═══════════════════════════════════════════════════════════════════
# TIER 1 — Code generation (harder)
# ═══════════════════════════════════════════════════════════════════

- id: sentinel_code_02
  suite: coder
  prompt: "Write a python function to count the number of prime numbers less than a given non-negative number.\n\nTest cases:\n  assert count_Primes_nums(5) == 2\n  assert count_Primes_nums(10) == 4\n  assert count_Primes_nums(100) == 25\n\nWrite a Python function to solve this."
  expected: "count_Primes_nums"
  scoring_method: substring
  scoring_config: {}

- id: sentinel_code_03
  suite: coder
  prompt: "Write a python function to find the frequency of the largest value in a given array.\n\nTest cases:\n  assert frequency_Of_Largest(5,[1,2,3,4,4]) == 2\n  assert frequency_Of_Largest(3,[5,6,5]) == 1\n  assert frequency_Of_Largest(4,[2,7,7,7]) == 3\n\nWrite a Python function to solve this."
  expected: "frequency_Of_Largest"
  scoring_method: substring
  scoring_config: {}

